resources:
  - service: "product-service"
    algorithm: sliding_window_log
    paths:
      - path: "/products"
        method: "GET"
        rules:
          limits:
            - window_seconds: 30
              limit: 10
              precision: 10
            - window_seconds: 60
              limit: 12
              precision: 10
      - path: "/products/:id"
        method: "GET"
        rules:
          limits:
            - window_seconds: 10
              limit: 10
            - window_seconds: 60
              limit: 50
            - window_seconds: 86400
              limit: 1000
      - path: "/products"
        method: "POST"
        rules:
          limits:
            - window_seconds: 10
              limit: 10
            - window_seconds: 60
              limit: 50
            - window_seconds: 86400
              limit: 1000
        
